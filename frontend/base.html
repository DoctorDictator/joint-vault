<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joint Bank Account</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fafafa;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 1.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 1.5rem;
      text-align: center;
    }
    .section {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #e0e0e0;
    }
    .section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin: 0 0 0.75rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.375rem;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fff;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #333;
    }
    .input-hint {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.25rem;
    }
    button {
      width: 100%;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      color: #fff;
      background: #333;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover { background: #1a1a1a; }
    button:active { background: #000; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #fff;
      color: #333;
      border: 1px solid #ccc;
    }
    .btn-secondary:hover { background: #f5f5f5; }
    .accounts-list {
      font-size: 0.875rem;
    }
    .account-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #eee;
    }
    .account-item:last-child { border-bottom: none; }
    .account-id { font-weight: 500; }
    .account-balance { color: #666; }
    .events {
      font-size: 0.75rem;
      color: #666;
      font-family: monospace;
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 3px;
      padding: 0.75rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .event-line { margin-bottom: 0.25rem; }
    .status {
      text-align: center;
      font-size: 0.875rem;
      color: #666;
      margin-top: 1rem;
    }
    .error {
      color: #b00020;
      background: #fce8e6;
      border: 1px solid #f5c6cb;
      border-radius: 3px;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Joint Bank Account</h1>

    <div id="error" class="error" style="display:none;"></div>

    <div class="section">
      <div class="section-title">Create Account</div>
      <label for="owners">Other owners (comma-separated addresses)</label>
      <input type="text" id="owners" placeholder="0x..., 0x..." />
      <div class="input-hint">Leave empty for single-owner account. Max 3 additional owners.</div>
      <button id="btn-create" onclick="createAccount()">Create Account</button>
    </div>

    <div class="section">
      <div class="section-title">Your Accounts</div>
      <div id="accounts" class="accounts-list">No accounts found. Click View Accounts to refresh.</div>
      <button id="btn-view" class="btn-secondary" onclick="viewAccounts()">View Accounts</button>
    </div>

    <div class="section">
      <div class="section-title">Events</div>
      <div id="events" class="events">Waiting for events...</div>
    </div>

    <div class="status">
      <span id="status">Connect MetaMask to begin</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.2.0/ethers.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
